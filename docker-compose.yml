services:
  postgres:
    image: postgres:16-alpine
    container_name: whatsapp-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whatsapp-crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: whatsapp-crm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/crm?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECONDS:-60}
      TZ: UTC
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/prisma:/app/prisma
      - ./apps/backend/sessions:/app/sessions
      - ./apps/backend/package.json:/app/package.json
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: whatsapp-crm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      PORT: 3000
      BACKEND_INTERNAL_URL: http://backend:4000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-WhatsApp CRM}
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  redis_data:
